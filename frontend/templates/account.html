<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title data-i18n="account_title">アカウント情報</title>
    <script>
        const savedTheme = localStorage.getItem("app-theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
    </script>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/account.css">
    <script src="/static/i18n.js"></script>
    <script src="/static/theme.js"></script>
    <script src="https://unpkg.com/i18next@latest/dist/umd/i18next.min.js"></script>
    <script src="https://unpkg.com/i18next-http-backend@latest/i18nextHttpBackend.min.js"></script>
</head>
<body class="i18n-loading">
    <header class="navbar">
        <h1 class="logo">CardsApp</h1>
        <div class="nav-actions">
            <div class="theme-menu">
                <button id="theme-toggle" class="icon-btn shadow-btn" onclick="toggleTheme()" data-i18n-title="setting_theme">
                    <i data-lucide="sun" id="theme-icon-sun"></i>
                    <i data-lucide="moon" id="theme-icon-moon" class="hidden"></i>
                </button>
            </div>
        </div>
    </header>

<div class="account-container">
    <a href="/" class="back-btn"><i data-lucide="arrow-left"></i> <span data-i18n="btn_back_home">ホームに戻る</span></a>

    <div class="profile-header">
        <div class="profile-icon"><i data-lucide="user" style="width: 40px; height: 40px;"></i></div>
        <h2 id="display-username">---</h2>
        <p id="display-email" style="color: var(--text-muted);">---</p>
    </div>

    <div class="stat-grid">
        <div class="stat-box">
            <div data-i18n="stat_cards" style="color: var(--text-muted); font-size: 0.9em;">カード</div>
            <div class="stat-number" id="stat-cards">0</div>
        </div>
        <div class="stat-box">
            <div data-i18n="stat_likes" style="color: var(--accent-color); font-size: 0.9em;">いいね</div>
            <div class="stat-number" id="stat-likes">0</div>
        </div>
        <div class="stat-box">
            <div data-i18n="stat_favorites" style="color: #eab308; font-size: 0.9em;">お気に入り</div>
            <div class="stat-number" id="stat-favorites">0</div>
        </div>
    </div>

    <div class="settings-section">
        <div class="account-section" style="border-top: none; padding-top: 0;">
            <div class="setting-item">
                <span data-i18n="changing_password">アカウントのパスワードを変更します。</span>
                <button onclick="window.location.href='/change-password'" class="btn btn-secondary" data-i18n="password_change">パスワードを変更する</button>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        lucide.createIcons();
        initThemeSelector();
    });
</script>
<script src="/static/account.js"></script>
</body>
</html>
