server {
    listen 80;
    server_name _;

    # --- セキュリティ設定 ---
    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # CSP: Lucideアイコン(unpkg)やTailwindなどの外部リソースを許可しつつ、インライン実行も許可
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://unpkg.com https://cdn.tailwindcss.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://generativelanguage.googleapis.com https://unpkg.com;" always;

    # --- 静的ファイルの最適化 ---
    # /static/ へのアクセスは、Flaskを通さずNginxが直接配信することで高速化します
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # --- ルーティング設定 ---

    # 1. API・エディタ・ログインなど、Flaskに処理を任せるすべてのリクエスト
    # location / とまとめることで、記述ミスによる404を防ぎます
    location / {
        proxy_pass http://backend:5000;
        
        # Flask側で「正しいURL」を認識させるために必要なヘッダー
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # タイムアウト対策（DB起動待ちや重い処理用）
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # エラーページ
    error_page 403 404 /404.html;
}