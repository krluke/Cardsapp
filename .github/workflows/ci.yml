name: Python CI (Code Check)

# mainブランチに向けてPR（提案）が出された時、またはPushされた時に動く
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # backendフォルダ内で作業するよう指定
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: コードをダウンロード
        uses: actions/checkout@v3

      - name: Pythonの準備
        uses: actions/setup-python@v4
        with:
          python-version: "3.10" # お使いのバージョンに合わせてください

      - name: 必要なパッケージのインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest # 検査用ツールを追加インストール

      - name: クリーンなコードかチェック (Flake8)
        run: |
          # 文法エラーや、未定義の変数など「明らかなバグ」があればここでエラーにして止める
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: テストの実行 (Pytest)
        run: |
          # 自動テストがあれば実行する（今は空でもOK）
          pytest || echo "No tests found, skipping"
