<!DOCTYPE html>
{% load static %}
<html lang="ja">
<head>
    <script>
        const savedTheme = localStorage.getItem("app-theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="change_password_title">パスワード変更</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <link rel="stylesheet" href="{% static 'change_password.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="{% static 'i18n.js' %}"></script>
</head>
<body>

    <!-- ナビゲーションバー -->
    <header class="navbar">
        <h1 class="logo">CardsApp</h1>
    </header>

    <div class="change-password-container">
        <div class="change-password-box">
            <a href="/account" class="back-btn"><i data-lucide="arrow-left"></i> <span data-i18n="btn_back_to_account">アカウントに戻る</span></a>

            <h2 class="auth-title" data-i18n="change_password_heading">パスワードの変更</h2>

            <div id="error-message"   class="msg-error   hidden"></div>
            <div id="success-message" class="msg-success hidden"></div>

            <form id="change-password-form">

                <div class="form-group">
                    <label for="current-password" data-i18n="label_current_password">現在のパスワード</label>
                    <input type="password" id="current-password"
                           class="input-field"
                           data-i18n="placeholder_current_password"
                           placeholder="現在のパスワード" required>
                </div>

                <div class="form-group">
                    <label for="new-password" data-i18n="label_new_password">新しいパスワード</label>
                    <input type="password" id="new-password"
                           class="input-field"
                           data-i18n="placeholder_new_password"
                           placeholder="新しいパスワード（6文字以上）" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirm-password" data-i18n="label_confirm_password">新しいパスワード（確認用）</label>
                    <input type="password" id="confirm-password"
                           class="input-field"
                           data-i18n="placeholder_confirm_password"
                           placeholder="もう一度入力" required minlength="6">
                </div>

                <button type="submit" class="primary-btn w-full" style="margin-top: 0.5rem;">
                    <i data-lucide="save"></i>
                    <span data-i18n="btn_save_password">変更を保存</span>
                </button>

            </form>
        </div>
    </div>

    <script src="{% static 'change_password.js' %}"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
