version: "3.8"

services:
  # --- MySQL データベース ---
  db:
    image: mysql:8.0
    container_name: my-mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: flashcards_db
      MYSQL_USER: flashcard_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      # NAS内の「db_data」フォルダにデータを永続化
      - ./db_data:/var/lib/mysql

  # --- Python バックエンド ---
  backend:
    build: ./backend
    container_name: my-backend
    restart: always
    # 他のデバイスからアクセスする場合、127.0.0.1: は外すのがéma.gener一般です
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - DB_HOST=db # service名「db」で通信可能
      - DB_USER=flashcard_user
      - DB_PASSWORD=flashcard_pass
      - DB_NAME=flashcards_db
      - GMAIL_USER=${GMAIL_USER:-fromserver.noreply@gmail.com}
      - GMAIL_PASS=${GMAIL_PASS}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
    depends_on:
      - db

  # --- Nginx フロントエンド ---
  nginx:
    image: nginx:alpine
    container_name: my-frontend
    restart: always
    ports:
      - "9000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
