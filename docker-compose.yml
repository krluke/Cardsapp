version: '3.8'

services:
  db:
    image: mariadb:11.4
    container_name: my-mariadb-db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: flashcards_db
      MARIADB_USER: flashcard_user
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "flashcard_user", "-p${MARIADB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  backend:
    build: ./backend
    container_name: my-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_USER=${DB_USER:-flashcard_user}
      - DB_PASSWORD=${MARIADB_PASSWORD}
      - DB_NAME=${DB_NAME:-flashcards_db}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_PASS=${GMAIL_PASS}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - DEBUG=${DEBUG:-True}
      - RUNNING_IN_DOCKER=1
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/folders?tab=global-folders"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: my-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend