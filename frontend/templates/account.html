<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title data-i18n="account_title">アカウント情報</title>
    <script>
        const savedTheme = localStorage.getItem("app-theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
    </script>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/account.css">
    <script src="/static/i18n.js"></script>
</head>
<body>

<div class="account-container">
    <a href="/" class="back-btn"><i data-lucide="arrow-left"></i> <span data-i18n="btn_back_home">ホームに戻る</span></a>

    <div class="profile-header">
        <div class="profile-icon"><i data-lucide="user" style="width: 40px; height: 40px;"></i></div>
        <h2 id="display-username">---</h2>
        <p id="display-email" style="color: var(--text-muted);">---</p>
    </div>

    <div class="stat-grid">
        <div class="stat-box">
            <div data-i18n="stat_cards" style="color: var(--text-muted); font-size: 0.9em;">カード</div>
            <div class="stat-number" id="stat-cards">0</div>
        </div>
        <div class="stat-box">
            <div data-i18n="stat_likes" style="color: var(--accent-color); font-size: 0.9em;">いいね</div>
            <div class="stat-number" id="stat-likes">0</div>
        </div>
        <div class="stat-box">
            <div data-i18n="stat_favorites" style="color: #eab308; font-size: 0.9em;">お気に入り</div>
            <div class="stat-number" id="stat-favorites">0</div>
        </div>
    </div>

    <div class="settings-section">
        <div class="setting-item">
            <span data-i18n="setting_theme">サイトのテーマ</span>
            <select id="theme-selector" class="theme-select">
                <option value="light" data-i18n="theme_sand">🌅 サンド＆クリーム</option>
                <option value="dark" data-i18n="theme_dark">🌙 ダークモード</option>
            </select>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        lucide.createIcons();
        const themeSelector = document.getElementById("theme-selector");
        const currentTheme = localStorage.getItem("app-theme") || "light";
        themeSelector.value = currentTheme;

        themeSelector.addEventListener("change", (e) => {
            const newTheme = e.target.value;
            document.documentElement.setAttribute("data-theme", newTheme);
            localStorage.setItem("app-theme", newTheme);
        });
    });
</script>
<script src="/static/account.js"></script>
</body>
</html>
