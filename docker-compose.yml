services:
  # --- MySQL データベース ---
  db:
    image: mysql:8.0
    container_name: my-mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: flashcards_db
      MYSQL_USER: flashcard_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "flashcard_user", "-p${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  # --- Django バックエンド ---
  backend:
    build: ./backend
    container_name: my-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_USER=flashcard_user
      - DB_PASSWORD=flashcard_pass
      - DB_NAME=flashcards_db
      - GMAIL_USER=${GMAIL_USER:-fromserver.noreply@gmail.com}
      - GMAIL_PASS=${GMAIL_PASS}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - DEBUG=True
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
      - ./staticfiles:/app/staticfiles:ro
    depends_on:
      db:
        condition: service_healthy

  # --- Nginx フロントエンド ---
  nginx:
    image: nginx:alpine
    container_name: my-frontend
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./staticfiles:/usr/share/nginx/html/static:ro
      - ./frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
