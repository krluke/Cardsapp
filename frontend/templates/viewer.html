<!DOCTYPE html>
<html lang="ja">
<head>
    <script>
        const savedTheme = localStorage.getItem("app-theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ★ data-i18n で動的にタイトルを切り替え -->
    <title data-i18n="viewer_title">カードビューワー</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/i18next@latest/dist/umd/i18next.min.js"></script>
    <script src="https://unpkg.com/i18next-http-backend@latest/i18nextHttpBackend.min.js"></script>
    <!-- ★ i18n.jsを最初に読む（DOMContentLoaded内で翻訳適用） -->
    <script src="/static/i18n.js"></script>
    <script src="/static/theme.js"></script>
</head>
<body class="viewer-body i18n-loading">
    <div class="editor-toolbar" style="justify-content: flex-start;">
        <!-- ★ ホーム戻るボタン -->
        <button onclick="goToHome()" class="icon-btn shadow-btn mr-2"
                data-i18n-title="btn_home"
                title="ホームに戻る">
            <i data-lucide="home"></i>
        </button>

        <!-- ★ テーマ切り替え -->
        <select id="theme-select" class="icon-btn shadow-btn mr-2" onchange="toggleTheme(this.value)" data-i18n-title="setting_theme">
            <option value="light" data-i18n="theme_light">Light</option>
            <option value="dark" data-i18n="theme_dark">Dark</option>
            <option value="sepia" data-i18n="theme_sepia">Sepia</option>
        </select>

        <!-- ★ ヘッダーテキストはdata-i18nで翻訳 -->
        <span class="viewer-header-text" data-i18n="viewing_mode">閲覧モード</span>
    <button onclick=\"translateWithAI()\" class=\"tool-btn mr-2\" id=\"ai-translate-btn\" style=\"background: var(--accent-light); border-color: var(--accent-color);\" data-i18n-title=\"btn_translate\" title=\"AI 翻訳\">
        <i data-lucide=\"translate\"></i>
    </button>
    </div>

    <div class="card-container">
        <!-- ★ 前へボタン：アイコンのみ表示なのでtooltipを翻訳 -->
        <button onclick="prevCard()" class="nav-btn shadow-btn"
                data-i18n-title="btn_prev_card"
                title="前のカード (←キー)">
            <i data-lucide="chevron-left"></i>
        </button>

        <div class="flashcard-scene" onclick="flipCard(event)">
            <div class="flashcard" id="current-card">
                <div class="card-face card-front" id="card-front"></div>
                <div class="card-face card-back"  id="card-back"></div>
        <button onclick="translateWithAI()" class="tool-btn mr-2" id="ai-translate-btn" style="background: var(--accent-light); border-color: var(--accent-color);" data-i18n-title="btn_translate" title="AI 翻訳">
            <i data-lucide="translate"></i>
        </button>
    </div>
        </div>

        <div class="nav-right-group">
            <div class="card-counter" id="card-counter" style="margin-right: 15px;">1 / 1</div>
            <!-- ★ 次へボタン：同様にtooltipを翻訳 -->
            <button onclick="nextCard()" class="nav-btn shadow-btn"
                    data-i18n-title="btn_next_card"
                    title="次のカード (→キー)">
                <i data-lucide="chevron-right"></i>
            </button>
        </div>
    </div>

    <script>
        window.CURRENT_FOLDER_ID = "{{ folder_id }}";
    </script>
    <script src="/static/viewer.js"></script>
    <!-- ★ アイコン描画 -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
            initThemeSelector();
        });
    </script>
</body>
</html>
