name: Python CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest

    - name: Lint with Flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run Tests
      run: |
        pytest || echo "No tests found, skipping"

  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    env:
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Load environment variables
      run: |
        if [ -f ~/server-project/.env ]; then
          echo "Loading environment variables from ~/server-project/.env"
          # Filter out comments and blank lines, then append to $GITHUB_ENV
          grep -v '^#' ~/server-project/.env | grep -v '^$' >> $GITHUB_ENV
        else
          echo "Warning: .env file not found at ~/server-project/.env"
        fi

    - name: Update local code
      run: |
        git fetch origin
        git reset --hard origin/main
        git clean -fdx

    - name: Restart Docker Containers
      run: |
        docker-compose down --remove-orphans
        docker buildx prune -f
        docker-compose up -d --build --force-recreate
        sleep 15
        docker-compose ps

    - name: Verify Backend Health
      run: |
        docker-compose ps

    - name: Collect Static Files
      run: |
        docker-compose exec -T backend python manage.py collectstatic --noinput || true
