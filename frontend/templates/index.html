<!DOCTYPE html>
<html lang="ja">
<head>
    <script>
        const savedTheme = localStorage.getItem("app-theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardsApp - ホーム</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/i18next@latest/dist/umd/i18next.min.js"></script>
    <script src="https://unpkg.com/i18next-http-backend@latest/i18nextHttpBackend.min.js"></script>
</head>
<body class="i18n-loading">
    <header class="navbar">
        <h1 class="logo">CardsApp</h1>
        <div class="nav-actions">

            <!-- ★ 新規作成ボタン -->
            <button id="add-folder-btn" class="primary-btn shadow-btn hidden"
                    onclick="createNewFolderUI()" data-i18n="btn_create_folder">
                <i data-lucide="folder-plus"></i>
            </button>

            <!-- ★ 言語切り替えボタン -->
            <!-- ★ テーマ切り替え -->
<div class="theme-menu">
                  <select id="theme-select" class="icon-btn shadow-btn" onchange="toggleTheme(this.value)" data-i18n-title="setting_theme">
                      <option value="light" data-i18n="theme_light">Light</option>
                      <option value="dark" data-i18n="theme_dark">Dark</option>
                      <option value="sepia" data-i18n="theme_sepia">Sepia</option>
                  </select>
              </div>
            <div class="lang-menu">
                <button class="lang-btn" id="lang-btn" onclick="toggleLangMenu(event)">
                    <i data-lucide="globe"></i>
                    <span id="current-lang-text">JA</span>
                </button>
                <div id="lang-dropdown" class="lang-dropdown hidden">
                    <button class="lang-option" onclick="selectLanguage('ja', event)">🇯🇵 日本語</button>
                    <button class="lang-option" onclick="selectLanguage('en', event)">🇺🇸 English</button>
                </div>
            </div>

            <!-- ★ アカウントメニュー -->
            <div class="account-menu">
                <button onclick="toggleAuthMenu()" class="icon-btn shadow-btn" id="account-icon-btn">
                    <i data-lucide="user"></i>
                </button>
                <div id="auth-dropdown" class="dropdown hidden">
                    <div id="menu-guest">
                        <button onclick="showLogin()" class="dropdown-item" data-i18n="menu_login">
                            <i data-lucide="log-in"></i>
                        </button>
                    </div>
                    <div id="menu-user" class="hidden">
                        <div class="menu-header">
                            <span id="menu-username" style="font-weight:bold;"></span>
                        </div>
                        <a href="/account" class="dropdown-item" data-i18n="menu_account_info">
                            <i data-lucide="user"></i>
                        </a>
                        <div class="dropdown-divider"></div>
                        <button onclick="handleLogout()" class="dropdown-item logout-btn" data-i18n="menu_logout">
                            <i data-lucide="log-out"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="page-container">
        <div class="tabs-container">
            <button class="tab-btn active" id="tab-my"
                    onclick="switchTab('my-folders')" data-i18n="tab_my_folders"></button>
            <button class="tab-btn" id="tab-global"
                    onclick="switchTab('global-folders')" data-i18n="tab_global_folders"></button>
        </div>

        <div class="search-and-pagination-container">
            <div class="search-bar-wrapper">
                <input type="text" id="search-input"
                       data-i18n="search_placeholder">
                <button onclick="handleSearch()" class="shadow-btn" data-i18n="btn_search"></button>
            </div>
            <div id="pagination-controls" class="pagination-controls"></div>
        </div>

        <div id="my-folders-area">
            <div id="guest-message" class="empty-state">
                <p data-i18n="guest_message"></p>
                <button class="primary-btn" onclick="showLogin()" data-i18n="guest_login_btn"></button>
            </div>
            <div class="folder-grid hidden" id="my-folders-grid"></div>
        </div>

        <div id="global-folders-area" class="hidden">
            <div id="global-guest-message" class="empty-state">
                <p data-i18n="global_guest_message">ログインすると全世界の公開カードを閲覧できます。</p>
                <button class="primary-btn" onclick="showLogin()" data-i18n="guest_login_btn">ログインする</button>
            </div>
            <div class="folder-grid hidden" id="global-folders-grid"></div>
        </div>
    </main>

    <!-- フォルダ設定モーダル -->
    <div id="folder-settings-modal" class="modal hidden">
        <div class="modal-content auth-box shadow-btn">
            <button class="close-btn" onclick="closeSettingsModal()"><i data-lucide="x"></i></button>
            <h2 class="auth-title" data-i18n="folder_settings_title">フォルダ設定</h2>

            <div class="mb-1" style="text-align: left;">
                <label style="font-size: 14px; font-weight: bold;" data-i18n="label_folder_name">フォルダ名</label>
                <input type="text" id="edit-folder-title" class="input-field mt-1"
                       data-i18n="placeholder_folder_name" placeholder="フォルダ名">
            </div>

            <div class="mb-1" style="text-align: left;">
                <label style="font-size: 14px; font-weight: bold;" data-i18n="label_visibility">公開設定</label>
                <select id="edit-folder-visibility" class="input-field mt-1" style="width:100%; height:42px;">
                    <option value="private"  data-i18n="visibility_private">プライベート (自分のみ)</option>
                    <option value="public"   data-i18n="visibility_public">パブリック (全体公開)</option>
                    <option value="shared" disabled data-i18n="visibility_shared">特定の人のみ (準備中)</option>
                </select>
            </div>

            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="primary-btn" style="flex:2;" onclick="saveFolderSettings()" data-i18n="btn_save">保存</button>
                <button class="secondary-btn" style="flex:1; background-color:#fee2e2; color:#dc2626; border:none;"
                        onclick="confirmDeleteFolder()" data-i18n="btn_delete">削除</button>
            </div>
        </div>
    </div>

    <!-- 認証モーダル -->
    <div id="auth-modal" class="modal hidden">
        <div class="modal-content auth-box">
            <button class="close-btn" onclick="closeAuthModal()"><i data-lucide="x"></i></button>

            <form id="login-view" onsubmit="handleLogin(event)">
                <h2 class="auth-title" data-i18n="login_title">ログイン</h2>
                <input type="text"     id="login-id"       class="input-field mb-1"
                       data-i18n="placeholder_login_id" placeholder="メール または ユーザー名" required>
                <input type="password" id="login-password" class="input-field mb-1"
                       data-i18n="placeholder_password" placeholder="パスワード" required>
                <button type="submit" class="primary-btn w-full" data-i18n="btn_login">ログイン</button>
                <p class="switch-auth-text">
                    <span data-i18n="switch_to_signup_text">アカウントがない？</span>
                    <span onclick="switchAuthView('signup')" class="text-link"
                          data-i18n="switch_to_signup_link">新規登録</span>
                </p>
            </form>

            <form id="signup-view" class="hidden" onsubmit="handleSignup(event)">
                <h2 class="auth-title" data-i18n="signup_title">新規登録</h2>
                <input type="text"  id="signup-username" class="input-field mb-1"
                       data-i18n="placeholder_username" placeholder="ユーザー名" required>
                <div class="input-with-btn mb-1">
                    <input type="email" id="signup-email" class="input-field"
                           data-i18n="placeholder_email" placeholder="メールアドレス" required>
                    <button type="button" class="secondary-btn shadow-btn" id="send-code-btn"
                            onclick="sendVerificationCode()" data-i18n="btn_send_code">送信</button>
                </div>
                <input type="text"     id="signup-code"     class="input-field mb-1"
                       data-i18n="placeholder_verify_code" placeholder="認証コード" required>
                <input type="password" id="signup-password" class="input-field mb-1"
                       data-i18n="placeholder_password"    placeholder="パスワード" required>
                <button type="submit" class="primary-btn w-full" data-i18n="btn_signup">登録</button>
                <p class="switch-auth-text">
                    <span data-i18n="switch_to_login_text">作成済み？</span>
                    <span onclick="switchAuthView('login')" class="text-link"
                          data-i18n="switch_to_login_link">ログイン</span>
                </p>
            </form>
        </div>
    </div>

    <!-- ★ i18n.jsを最初に読み込む -->
    <script src="/static/i18n.js"></script>
    <script src="/static/auth.js"></script>
    <script src="/static/theme.js"></script>
    <script src="/static/index.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
